<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal Flux - SSDF Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f8fafc;
        margin: 0;
        overflow: hidden;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      
      /* Shiny Glassmorphism */
      .glass {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      
      .glass-shine {
        position: relative;
        overflow: hidden;
      }
      
      .glass-shine::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -150%;
        width: 100%;
        height: 200%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.05),
          transparent
        );
        transform: rotate(45deg);
        animation: light-sweep 6s infinite;
        pointer-events: none;
      }

      @keyframes light-sweep {
        0% { left: -150%; }
        20% { left: 150%; }
        100% { left: 150%; }
      }

      .glow-cyan {
        box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        border-color: rgba(34, 211, 238, 0.3);
      }
      
      .text-glow-cyan {
        text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
      }

      .bg-grid {
        background-image: radial-gradient(rgba(34, 211, 238, 0.1) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(34, 211, 238, 0.2);
        border-radius: 10px;
      }

      /* Removal of Italics Global Policy */
      * {
        font-style: normal !important;
      }
      
      /* Table formatting for markdown */
      table { width: 100%; border-collapse: collapse; margin-top: 1rem; margin-bottom: 1rem; }
      th, td { border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem; text-align: left; font-size: 0.75em; color: #cbd5e1; }
      th { background-color: rgba(34,211,238,0.1); font-weight: bold; }
      
      /* Diagram layout & text scaling */
      .mermaid { display: flex; justify-content: center; }
      .mermaid svg { max-width: 80% !important; transform: scale(0.8); transform-origin: center; margin: 0 auto; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "recharts": "https://esm.sh/recharts@^3.6.0",
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "react-dom": "https://esm.sh/react-dom@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "jspdf": "https://esm.sh/jspdf@^2.5.1"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
